name: Try building on pull

on:
    push:
        branches: [ master ]
    pull_request:
        branches: [ master ]
    workflow_dispatch:

jobs:
    test:
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest]
        runs-on: ${{ matrix.os }}
        name: Build and Test (${{ matrix.os }})
        steps:
          - name: Checkout
            uses: actions/checkout@v3
          - name: Setup Zig
            uses: mlugg/setup-zig@v2
            with:
                version: '0.16.0'
          - name: Build
            run: zig build